
<!DOCTYPE html>

<!-- <script> Below is the Internet status -->
<script>
    // Function to update the status display
    function updateOnlineStatus(event) {
        var statusElement = document.getElementById("status");
        if (navigator.onLine) {
            statusElement.innerHTML = "Internet Status: Online";
        } else {
            statusElement.innerHTML = "Internet Status: Offline";
        }
    }
    
    // Add event listeners for online and offline events
    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);

    // Initial check when the page loads
    window.onload = updateOnlineStatus;
    setInterval(updateOnlineStatus, 1000)
</script>

    Timer stuff
================-->
<script>
function setT(m) { 
    hours = 0; 
    seconds = 1; 
    minutes = m; 
    timer(); 
}

let appState = JSON.parse(localStorage.getItem("sys-state")) || { version: "clock" };
let version = appState.version;
const all = document.getElementsByClassName("clock")
const all1 = document.getElementsByClassName("top-bar")
const all2 = document.getElementsByClassName("bottom-bar")
let del = "f"
cl.onclick = () => {
    pause = "f"
    fullTimer()
}
function fullTimer() {
    if (version == "timer") {
        del = "t"
        Array.from(all).forEach(el => {
            el.style.display = "none"
        });
        Array.from(all1).forEach(el => {
            el.style.display = "none"
        });
        Array.from(all2).forEach(el => {
            el.style.display = "none"
        });

        document.getElementById("clock").style.fontSize = "350px"
        document.getElementById("default").style.padding = "0px"
        document.getElementById("note").innerText = 
        `Click the timer to return home.`
        seconds += 1
        timer()
    }
}
function clean1() {
    if (del == "f") {
        document.getElementById("note").innerText = 
        null;
    }
}
window.addEventListener("keydown", event => {
    if (event.key === "Escape") {
        unfulltimer()
    }
})
clock.onclick = () => {
    unfulltimer()
}

function unfulltimer() {
    if (del == "t") {
        del = "f"
        document.getElementById("clock").style.fontSize = "90px"
        document.getElementById("default").style.padding = "50px"
        Array.from(all).forEach(el => {
            el.style.display = "block"
        });
        Array.from(all1).forEach(el => {
            el.style.display = "block"
        });
        Array.from(all2).forEach(el => {
            el.style.display = "block"
        });
        document.getElementById("note").innerText = 
        ``
        seconds += 1
        timer()
        clean1()
    }
    else {
        fullTimer()
    }
}

window.onload = () => {
    if (version === "timer") {
        document.getElementById("options").style.display = "block";
        document.getElementById("options2").style.display = "block";
        timer();
    } else {
        document.getElementById("options").style.display = "none";
        document.getElementById("options2").style.display = "none";
        updateClock();
        updateDate();
    }
};

function specific() {
    let p = prompt("Choose how many minutes you want the timer running for:", "10")
    if (p){
        if (p > 1441) {
            p = 1441
        }
        hours = 0
        //minutes = Number(p);
        minutes = parseInt(p, 10);
        seconds = 2
    }
}

document.getElementById("options").style.display = "none";
document.getElementById("options2").style.display = "none";

notClock.onclick = () => {
    if (version == "clock") {
        version = "timer";
        localStorage.setItem("sys-state", JSON.stringify({ version: version }));
        document.getElementById("options").style.display = "block";
        document.getElementById("options2").style.display = "block";
        timer();
    } else {
        version = "clock";
        localStorage.setItem("sys-state", JSON.stringify({ version: version }));
        document.getElementById("options").style.display = "none";
        document.getElementById("options2").style.display = "none";
        updateClock();
        updateDate();
    }
};

function resetTimer() {
    if (pause == "f") {
        pause = "t";
        document.getElementById('clock').innerText = 
        `Paused`;
        document.getElementById("date").innerHTML = "<reset type='button' onclick='resetTimer()'>Resume timer</reset>";
    }
    else {
        pause = "f";
        seconds += 1;
        timer()
    }
}

let seconds = 1;
let minutes = 45;
let hours = 0;

function format1() {
        if (seconds <= 0) {
            minutes -= 1;
            seconds = 60;
        }
        if (minutes == 0 && hours >= 1) {
            hours -= 1;
            minutes = 60;
        }
        if (minutes > 60) {
            minutes -= 60;
            hours += 1;
        }
}
function format() {
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
}
let pause = "f"



function timer() {
    if (seconds == 0 && minutes == 0 && hours == 0) {
        document.getElementById("clock").innerText = `DONE!`;
        document.getElementById("note").innerText = 
        `Click "Done!" to set another timer.`
        clean1()
    } 
    else {
        if (pause == "f") {
            format()
            seconds--;
            if (version == "timer") {
                let formattedMinutes = String(minutes).padStart(2, '0');
                let formattedSeconds = String(seconds).padStart(2, '0');
                let formattedHours = String(hours).padStart(2, '0');
                if (del == "f") {
                    if (hours > 0) {
                        document.getElementById("clock").innerText = `Timer: ${formattedHours}:${formattedMinutes}:${formattedSeconds}`;
                    }
                    else {
                        document.getElementById("clock").innerText = `Timer: ${formattedMinutes}:${formattedSeconds}`;
                    }
                }
                else {
                    if (hours > 0) {
                        let formattedHours = String(hours).padStart(2, '0');
                        document.getElementById("clock").innerText = `${formattedHours}:${formattedMinutes}:${formattedSeconds}`;
                    }
                    else {
                        document.getElementById("clock").innerText = `${formattedMinutes}:${formattedSeconds}`;
                    }
                }
                if (document.hidden) {
                    // Tab is now inactive
                    document.title = `Timer: ${formattedHours}:${formattedMinutes}:${formattedSeconds}`;
                    //document.title = `Bloxd.io - Play Free Online Games!`;
                } 

                //document.getElementById("clock").innerText = `Timer: ${formattedMinutes}:${formattedSeconds}`;
                document.getElementById("date").innerHTML = "<reset type='button' onclick='resetTimer()'>Pause timer</reset>";
            }
        }
    }
}
setInterval(timer, 1000);

</script>

<script>
function updateClock() {
    if (version == "clock") {
        document.getElementById("clock").innerText =
            new Date().toLocaleTimeString('en-US', {hour:"numeric", minute:"2-digit", second:"2-digit", hour12: true});
    } /*
    else {
        document.getElementById("date").innerText =
            new Date().toLocaleTimeString('en-US', {hour:"numeric", minute:"2-digit", second:"2-digit", hour12: true});
    }/*  */
}
setInterval(updateClock, 1000);
updateClock();

function updateDate() {
    if (version == "clock") {
        document.getElementById("date").innerText = new Date().toLocaleDateString();
    }
}
setInterval(updateDate, 1000);
updateDate();
document.addEventListener('keydown', function(event) {
    if (event.key === "a") {
        window.open('https://docs.google.com/spreadsheets/d/1aD-gkVpsBEiOZ4aVRIVzXktNw1s0KDrk7WIeoUqbh04/edit?gid=0#gid=0', 'newwindow', 'width=4000px,height=2000px'); 
        return false;
    }
});

full.onclick = () => {
    if(!document.fullscreenElement){
        document.documentElement.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
};

const gradients = [
    "linear-gradient(315deg,#ff0000,#ff8800)",
    "linear-gradient(315deg,#ff8800,#00cc00)",
    "linear-gradient(315deg,#00cc00,#00cc00,#4a86e8)",
    "linear-gradient(315deg,#4a86e8,#4a86e8,#ff00ff)",
    "linear-gradient(315deg,#ff00ff,#ff0000)"
];

let index = 0;

const bg1 = document.getElementById("bg1");
const bg2 = document.getElementById("bg2");

bg1.style.background = gradients[0];
bg1.style.opacity = 1;
bg2.style.opacity = 0;

function switchBackground() {
    const current = index % gradients.length;
    const next = (index + 1) % gradients.length;

    const topLayer = index % 2 === 0 ? bg2 : bg1;
    const bottomLayer = index % 2 === 0 ? bg1 : bg2;

    topLayer.style.background = gradients[next];
    topLayer.style.opacity = 1;
    bottomLayer.style.opacity = 0;

    index++;
}

setInterval(switchBackground, 4000);

/* BATTERY */
if (navigator.getBattery) {
    navigator.getBattery().then(battery => {
        function updateBattery() {
            const level = Math.round(battery.level * 100);
            // Show a bolt icon if charging, otherwise just the percentage
            const chargingIcon = battery.charging ? "⚡" : "";
            
            document.getElementById("battery").innerText = 
                `Battery: ${level}%${chargingIcon}`;
            if (level <= 25) {
                document.getElementById('battery').style.color = 'red';
            }
            else {
                if (level <= 55) {
                    document.getElementById('battery').style.color = 'orange'
                }
                else {
                    if (level <= 90) {
                        document.getElementById('battery').style.color = 'yellow'
                    }
                    else {
                        document.getElementById('battery').style.color = 'green'
                    }
                }
            }
            document.getElementById("o").innerText = 
                `Battery: ${level}%${chargingIcon}`;
        }
    
        updateBattery();
    
        battery.addEventListener("chargingchange", updateBattery);
        battery.addEventListener("levelchange", updateBattery);
    });
} else {
    document.getElementById("battery").innerText = "Battery: N/A";
}

/* WEATHER */
function temp() {
    fetch("https://api.open-meteo.com/v1/forecast?latitude=43.65&longitude=-79.38&current_weather=true")
    .then(r => r.json())
    .then(data => {
        if (data.current_weather) {
            document.getElementById("weather").innerText =
                "Temperature: " + data.current_weather.temperature + "°C";
        }
    })
    .catch(() => {
        document.getElementById("weather").innerText = "Weather Unavaliable";
    });
}

setInterval(temp, 1000)
temp()

</script>
