<script>
    // Function to update the status display
    function updateOnlineStatus(event) {
        var statusElement = document.getElementById("status");
        if (navigator.onLine) {
            statusElement.innerHTML = "Connexion au internet";
        } else {
            statusElement.innerHTML = "Pas de connexion au internet";
        }
    }
    
    // Add event listeners for online and offline events
    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);

    // Initial check when the page loads
    window.onload = updateOnlineStatus;
    setInterval(updateOnlineStatus, 1000)
</script>

<script>
/* Lag Machine *
window.open("file:///media/fuse/drivefs-943af7618645e8e834c8adf41ddd943c/root/Coding/timercommands.html", "_blank");
window.location.reload()/*  */
let appState = JSON.parse(localStorage.getItem("sys-state")) || { version: "clock" };
let version = appState.version;
const all = document.getElementsByClassName("clock")
const all1 = document.getElementsByClassName("top-bar")
const all2 = document.getElementsByClassName("bottom-bar")
let del = "f"
cl.onclick = () => {
    pause = "f"
    fullTimer()
}
function fullTimer() {
    if (version == "timer") {
        del = "t"
        Array.from(all).forEach(el => {
            el.style.display = "none"
        });
        Array.from(all1).forEach(el => {
            el.style.display = "none"
        });
        Array.from(all2).forEach(el => {
            el.style.display = "none"
        });

        document.getElementById("clock").style.fontSize = "350px"
        document.getElementById("default").style.padding = "0px"
        document.getElementById("note").innerText = 
        `Cliquez sur la minuteur pour rentrer au page des options.`
        seconds += 1
        timer()
    }
}
function clean1() {
    if (del == "f") {
        document.getElementById("note").innerText = 
        null;
    }
}
window.addEventListener("keydown", event => {
    if (event.key === "Escape") {
        unfulltimer()
    }
})
clock.onclick = () => {
    unfulltimer()
}

function unfulltimer() {
    if (del == "t") {
        del = "f"
        document.getElementById("clock").style.fontSize = "90px"
        document.getElementById("default").style.padding = "50px"
        Array.from(all).forEach(el => {
            el.style.display = "block"
        });
        Array.from(all1).forEach(el => {
            el.style.display = "block"
        });
        Array.from(all2).forEach(el => {
            el.style.display = "block"
        });
        document.getElementById("note").innerText = 
        null
        seconds += 1
        timer()
        clean1()
    }
    else {
        fullTimer()
    }
}

window.onload = () => {
    if (version === "timer") {
        document.getElementById("options").style.display = "block";
        document.getElementById("options2").style.display = "block";
        timer();
    } else {
        document.getElementById("options").style.display = "none";
        document.getElementById("options2").style.display = "none";
        updateClock();
        updateDate();
    }
};

function resetTimer() {

    else {
        pause = "f";
        seconds += 1;
        timer()
    }

let seconds = 1;
let minutes = 45;
let hours = 0;

function format1() {
        if (seconds <= 0) {
            minutes -= 1;
            seconds = 60;
        }
        if (minutes == 0 && hours >= 1) {
            hours -= 1;
            minutes = 60;
        }
        if (minutes > 61) {
            minutes -= 60;
            hours += 1;
        }
}
function format() {
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
    format1()
}
let pause = "f"



function timer() {
    if (seconds == 0 && minutes == 0 && hours == 0) {
        document.getElementById("clock").innerText = `Fin!`;
        document.getElementById("note").innerText = 
        `Clicker sur "Fin!" pour commencer une autre minuteur.`
        clean1()
    } else {
        if (pause == "f") {
            format()
            seconds--;
            if (version == "timer") {
                let formattedMinutes = String(minutes).padStart(2, '0');
                let formattedSeconds = String(seconds).padStart(2, '0');
                if (del == "f") {
                    if (hours > 0) {
                        let formattedHours = String(hours).padStart(2, '0');
                        document.getElementById("clock").innerText = `Minuteur: ${formattedHours}:${formattedMinutes}:${formattedSeconds}`;
                    }
                    else {
                        document.getElementById("clock").innerText = `Minuteur: ${formattedMinutes}:${formattedSeconds}`;
                    }
                }
                else {
                    if (hours > 0) {
                        let formattedHours = String(hours).padStart(2, '0');
                        document.getElementById("clock").innerText = `${formattedHours}:${formattedMinutes}:${formattedSeconds}`;
                    }
                    else {
                        document.getElementById("clock").innerText = `${formattedMinutes}:${formattedSeconds}`;
                    }
                }


                //document.getElementById("clock").innerText = `Timer: ${formattedMinutes}:${formattedSeconds}`;
                document.getElementById("date").innerHTML = "<reset type='button' onclick='resetTimer()'>Arrêtter la minuteur</reset>";
            }
        }
    }
}
setInterval(timer, 1000);

function updateClock() {
    if (version == "clock") {
        document.getElementById("clock").innerText =
            new Date().toLocaleTimeString('en-US', {hour:"numeric", minute:"2-digit", second:"2-digit", hour12: true});
    } /*
    else {
        document.getElementById("date").innerText =
            new Date().toLocaleTimeString('en-US', {hour:"numeric", minute:"2-digit", second:"2-digit", hour12: true});
    }/*  */
}
setInterval(updateClock, 1000);
updateClock();

function updateDate() {
    if (version == "clock") {
        document.getElementById("date").innerText = new Date().toLocaleDateString('en-CA');
    }
}
setInterval(updateDate, 1000);
updateDate();

full.onclick = () => {
    if(!document.fullscreenElement){
        document.documentElement.requestFullscreen();
    } else {
        document.exitFullscreen();

};

const gradients = [
    "linear-gradient(315deg,#ff0000,#ff8800)",
    "linear-gradient(315deg,#ff8800,#00cc00)",
    "linear-gradient(315deg,#00cc00,#00cc00,#4a86e8)",
    "linear-gradient(315deg,#4a86e8,#4a86e8,#ff00ff)",
    "linear-gradient(315deg,#ff00ff,#ff0000)"
];

let index = 0;

const bg1 = document.getElementById("bg1");
const bg2 = document.getElementById("bg2");

bg1.style.background = gradients[0];
bg1.style.opacity = 1;
bg2.style.opacity = 0;

function switchBackground() {
    const current = index % gradients.length;
    const next = (index + 1) % gradients.length;

    const topLayer = index % 2 === 0 ? bg2 : bg1;
    const bottomLayer = index % 2 === 0 ? bg1 : bg2;

    topLayer.style.background = gradients[next];
    topLayer.style.opacity = 1;
    bottomLayer.style.opacity = 0;

    index++;
}

setInterval(switchBackground, 4000);
