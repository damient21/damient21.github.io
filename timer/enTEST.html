<script>
    // Function to update the status display
    function updateOnlineStatus(event) {
        var statusElement = document.getElementById("status");
        if (navigator.onLine) {
            statusElement.innerHTML = "Internet Status: Online";
        } else {
            statusElement.innerHTML = "Internet Status: Offline";
        }
    }
    
    // Add event listeners for online and offline events
    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);

    // Initial check when the page loads
    window.onload = updateOnlineStatus;
    setInterval(updateOnlineStatus, 1000)
</script>

<script>
function updateClock() {
    if (version == "clock") {
        document.getElementById("clock").innerText =
            new Date().toLocaleTimeString('en-US', {hour:"numeric", minute:"2-digit", second:"2-digit", hour12: true});
    } /*
    else {
        document.getElementById("date").innerText =
            new Date().toLocaleTimeString('en-US', {hour:"numeric", minute:"2-digit", second:"2-digit", hour12: true});
    }/*  */
}
setInterval(updateClock, 1000);
updateClock();

function updateDate() {
    if (version == "clock") {
        document.getElementById("date").innerText = new Date().toLocaleDateString();
    }
}
setInterval(updateDate, 1000);
updateDate();
document.addEventListener('keydown', function(event) {
    if (event.key === "a") {
        window.open('https://docs.google.com/spreadsheets/d/1aD-gkVpsBEiOZ4aVRIVzXktNw1s0KDrk7WIeoUqbh04/edit?gid=0#gid=0', 'newwindow', 'width=4000px,height=2000px'); 
        return false;
    }
});

full.onclick = () => {
    if(!document.fullscreenElement){
        document.documentElement.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
};

const gradients = [
    "linear-gradient(315deg,#ff0000,#ff8800)",
    "linear-gradient(315deg,#ff8800,#00cc00)",
    "linear-gradient(315deg,#00cc00,#00cc00,#4a86e8)",
    "linear-gradient(315deg,#4a86e8,#4a86e8,#ff00ff)",
    "linear-gradient(315deg,#ff00ff,#ff0000)"
];

let index = 0;

const bg1 = document.getElementById("bg1");
const bg2 = document.getElementById("bg2");

bg1.style.background = gradients[0];
bg1.style.opacity = 1;
bg2.style.opacity = 0;

function switchBackground() {
    const current = index % gradients.length;
    const next = (index + 1) % gradients.length;

    const topLayer = index % 2 === 0 ? bg2 : bg1;
    const bottomLayer = index % 2 === 0 ? bg1 : bg2;

    topLayer.style.background = gradients[next];
    topLayer.style.opacity = 1;
    bottomLayer.style.opacity = 0;

    index++;
}

setInterval(switchBackground, 4000);

/* BATTERY */
if (navigator.getBattery) {
    navigator.getBattery().then(battery => {
        function updateBattery() {
            const level = Math.round(battery.level * 100);
            // Show a bolt icon if charging, otherwise just the percentage
            const chargingIcon = battery.charging ? "⚡" : "";
            
            document.getElementById("battery").innerText = 
                `Battery: ${level}%${chargingIcon}`;
            if (level <= 25) {
                document.getElementById('battery').style.color = 'red';
            }
            else {
                if (level <= 55) {
                    document.getElementById('battery').style.color = 'orange'
                }
                else {
                    if (level <= 90) {
                        document.getElementById('battery').style.color = 'yellow'
                    }
                    else {
                        document.getElementById('battery').style.color = 'green'
                    }
                }
            }
            document.getElementById("o").innerText = 
                `Battery: ${level}%${chargingIcon}`;
        }
    
        updateBattery();
    
        battery.addEventListener("chargingchange", updateBattery);
        battery.addEventListener("levelchange", updateBattery);
    });
} else {
    document.getElementById("battery").innerText = "Battery: N/A";
}

/* WEATHER */
function temp() {
    fetch("https://api.open-meteo.com/v1/forecast?latitude=43.65&longitude=-79.38&current_weather=true")
    .then(r => r.json())
    .then(data => {
        if (data.current_weather) {
            document.getElementById("weather").innerText =
                "Temperature: " + data.current_weather.temperature + "°C";
        }
    })
    .catch(() => {
        document.getElementById("weather").innerText = "Weather Unavaliable";
    });
}

setInterval(temp, 1000)
temp()

</script>
